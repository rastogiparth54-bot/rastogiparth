<!DOCTYPE html>
<html>
<head>
    <title>Amazon Clone</title>
    <!-- <link rel="stylesheet" href="style.css"> -->
     <style>
        body {
    margin: 0;
    font-family: Arial;
}

/* Header */
.header {
    background-color: #131921;
    padding: 10px;
    color: white;
}

.logo {
    font-size: 22px;
    font-weight: bold;
    display: inline-block;
    margin-right: 20px;
}

.header input {
    width: 300px;
    padding: 5px;
}

.header button {
    padding: 5px 10px;
}

/* Navigation */
.nav {
    background-color: #232f3e;
    padding: 10px;
}

.nav a {
    color: white;
    margin-right: 15px;
    text-decoration: none;
}

/* Banner */
.banner {
    background-color: #febd69;
    text-align: center;
    padding: 20px;
}

/* Products */
.products {
    display: flex;
    justify-content: space-around;
    padding: 20px;
}

.product {
    border: 1px solid #ccc;
    padding: 10px;
    text-align: center;
    width: 200px;
}

/* Footer */
.footer {
    background-color: #131921;
    color: white;
    text-align: center;
    padding: 10px;
}
     </style>
</head>
<body>

<!-- Header -->
<div class="header">
    <div class="logo">amazon.in</div>
    <input type="text" placeholder="Search Amazon">
    <button>Search</button>
</div>

<!-- Navigation -->
<div class="nav">
    <a href="#">All</a>
    <a href="#">Mobiles</a>
    <a href="#">Fashion</a>
    <a href="#">Electronics</a>
    <a href="#">Prime</a>
</div>

<!-- Banner -->
<div class="banner">
    <h2>Welcome to Amazon Clone</h2>
</div>

<!-- Products -->
<div class="products">
    <div class="product">
        <img src="https://m.media-amazon.com/images/I/814-8QkuetL._SY879_.jpg">
        <p>Product 1</p>
        <p>₹999</p>
    </div>

    <div class="product">
        <img src="https://m.media-amazon.com/images/I/715A-GsmIGL._SX569_.jpg">
        <p>Product 2</p>
        <p>₹1499</p>
    </div>

    <div class="product">
        <img src="https://m.media-amazon.com/images/I/41ZM7fTZSWL._SX679_.jpg">
        <p>Product 3</p>
        <p>₹1999</p>
    </div>
</div>

<!-- Footer -->
<div class="footer">
    © 2025 Amazon Clone
</div>

</body>
</html>
